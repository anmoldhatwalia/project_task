<div class="auth-wrapper">

  <div class="auth-card">

    <h1 class="title">
      Reset Password
    </h1>

    <p class="subtitle">
      Create a new password
    </p>

    <input
      type="password"
      [(ngModel)]="password"
      placeholder="New Password">
     @if(password && password.length < 6){ <p class="valid">Password must be at least 6 characters</p>
      }

    <input
      type="password"
      [(ngModel)]="confirmPassword"
      placeholder="Confirm Password">
      @if(confirmPassword &&password !== confirmPassword){
      <p class="valid" >Password is not Match</p>
      }


    <button
      (click)="resetPassword()">

      Reset Password

    </button>

  </div>

</div>
