<div class="auth-wrapper">

  <div class="auth-card">

    <h1 class="title">
      Forgot Password
    </h1>

    <p class="subtitle">
      Enter your email to receive a reset link
    </p>

    <input
      type="email"
      [(ngModel)]="email"
      placeholder="Email Address">

    <button
      (click)="sendLink()">

      Send Reset Link

    </button>

  </div>

</div>
